name: br_ppo_crypto_v15 paper trading

on:
  workflow_dispatch:
  schedule:
    - cron: "0 09 * * 1-5"
    - cron: "0 14 * * 1-5" 
permissions:
  contents: write

jobs:
  paper-trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Bootstrap log folders
        run: python scripts/bootstrap_logs.py

      - name: Run br_ppo_crypto_v15 paper trader
        env:
          ALPACA_CRYPTO_V15_KEY_ID: ${{ secrets.ALPACA_CRYPTO_V15_KEY_ID }}
          ALPACA_CRYPTO_V15_SECRET_KEY: ${{ secrets.ALPACA_CRYPTO_V15_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ vars.ALPACA_BASE_URL || 'https://paper-api.alpaca.markets' }}
          ALLOCATION_MODE: ${{ vars.ALLOCATION_MODE || 'ppo' }}
          REQUIRE_PPO: ${{ vars.REQUIRE_PPO || 'true' }}
          INCLUDE_PRIMARY_MODEL: ${{ vars.INCLUDE_PRIMARY_MODEL || 'false' }}
          DEFAULT_ACTION: ${{ vars.DEFAULT_ACTION || 'crypto10_freqai15_llm25_ichi25_bil25' }}
          SUBMIT_ORDERS: ${{ vars.SUBMIT_ORDERS || 'false' }}
          CANCEL_OPEN_ORDERS: ${{ vars.CANCEL_OPEN_ORDERS || 'false' }}
          FORCE_REBALANCE: ${{ vars.FORCE_REBALANCE || 'false' }}
          REBALANCE_EVERY_DAYS: ${{ vars.REBALANCE_EVERY_DAYS || '10' }}
          MIN_ORDER_NOTIONAL: ${{ vars.MIN_ORDER_NOTIONAL || '25' }}
        run: python scripts/paper_trade.py

      - name: Commit dashboard logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs
          if git diff --cached --quiet; then
            echo "No log changes to commit."
          else
            git commit -m "Update br_ppo_crypto_v15 dashboard logs"
            git push
          fi
